services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tenet
      POSTGRES_PASSWORD: tenet
      POSTGRES_DB: tenet_audit
    ports:
      # 5433 on the host: avoids clashing with a locally installed Postgres
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tenet -d tenet_audit"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build: .
    command: ["npx", "node-pg-migrate", "-m", "migrations", "up"]
    environment:
      DATABASE_URL: postgres://tenet:tenet@postgres:5432/tenet_audit
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://tenet:tenet@postgres:5432/tenet_audit
      PORT: "3000"
      HOST: 0.0.0.0
      LOG_LEVEL: info
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
